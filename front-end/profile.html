<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Profile - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Tajawal', sans-serif; background:#060911; }
    .glass { background:rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(15px); }
  </style>
</head>

<body class="text-zinc-100 min-h-screen">

<nav class="border-b border-slate-800 bg-slate-900/50">
  <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span></div>
    <a href="dashboard.html" class="text-teal-400 hover:underline">لوحة التحكم</a>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-10">

  <h1 class="text-3xl font-bold mb-8">الملف الشخصي</h1>

  <section class="glass p-6 rounded-3xl mb-8">
    <h2 class="text-xl font-bold mb-5">معلومات الحساب</h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
      <p><span class="text-zinc-400">الاسم:</span> <span id="fullName">...</span></p>
      <p><span class="text-zinc-400">الإيميل:</span> <span id="email">...</span></p>
      <p><span class="text-zinc-400">الهاتف:</span> <span id="phoneNumber">...</span></p>
      <p><span class="text-zinc-400">الصلاحية:</span> <span id="role">...</span></p>
    </div>
  </section>

  <section class="glass p-6 rounded-3xl mb-8">
    <h2 class="text-xl font-bold mb-5">تغيير كلمة المرور</h2>

    <div class="space-y-4">
      <input id="currentPassword" type="password" placeholder="كلمة المرور الحالية"
        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">

      <input id="newPassword" type="password" placeholder="كلمة المرور الجديدة"
        class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">

      <p id="passwordMessage" class="text-sm text-red-400"></p>

      <button onclick="changePassword()"
        class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3 rounded-xl">
        تغيير كلمة المرور
      </button>
    </div>
  </section>

  <button onclick="logoutDevice()"
    class="w-full bg-red-500/10 border border-red-500 text-red-400 py-3 rounded-xl hover:bg-red-500 hover:text-white">
    تسجيل الخروج من هذا الجهاز
  </button>

</main>

<script>
const API_BASE = "http://localhost:5000";

async function loadProfile() {
  const token = localStorage.getItem("token");
  if (!token) {
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${API_BASE}/api/users/profile`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const data = await res.json();

  if (!data.success) {
    window.location.href = "login.html";
    return;
  }

  const u = data.data;

  fullName.innerText = `${u.firstName} ${u.lastName}`;
  email.innerText = u.email;
  phoneNumber.innerText = u.phoneNumber || "-";
  role.innerText = u.role;
}

async function changePassword() {
  const token = localStorage.getItem("token");

  passwordMessage.className = "text-sm text-red-400";
  passwordMessage.innerText = "";

  const current_password = currentPassword.value.trim();
  const new_password = newPassword.value.trim();

  if (!current_password || !new_password) {
    passwordMessage.innerText = "املأ جميع الحقول";
    return;
  }

  const res = await fetch(`${API_BASE}/api/users/change-password`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      current_password,
      new_password
    })
  });

  const data = await res.json();

  if (!res.ok) {
    if (data.detail === "Current password is incorrect") {
      passwordMessage.innerText = "كلمة المرور الحالية غير صحيحة";
      return;
    }

    if (data.detail === "Google accounts cannot change password") {
      passwordMessage.innerText = "حسابات Google لا يمكن تغيير كلمة المرور لها";
      return;
    }

    passwordMessage.innerText = data.detail || "حدث خطأ";
    return;
  }

  passwordMessage.className = "text-sm text-green-400";
  passwordMessage.innerText = "تم تغيير كلمة المرور بنجاح";

  currentPassword.value = "";
  newPassword.value = "";
}

async function logoutDevice() {
  const token = localStorage.getItem("token");
  const deviceId = localStorage.getItem("deviceId");

  if (token && deviceId) {
    await fetch(`${API_BASE}/api/auth/logout`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${token}`
      },
      body: JSON.stringify({
        deviceId
      })
    });
  }

  localStorage.clear();
  sessionStorage.clear();
  window.location.href = "login.html";
}

loadProfile();
</script>

</body>
</html>
