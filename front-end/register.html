<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Space Z</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #09101d, #060911); }
    </style>
</head>
<body class="text-zinc-100 h-full flex flex-col justify-center items-center overflow-x-hidden p-4">

    <div class="absolute top-6 right-6">
        <button id="langBtn" class="bg-slate-900/80 text-zinc-300 hover:text-teal-400 px-4 py-1.5 rounded-full text-sm border border-slate-800">English</button>
    </div>

    <div class="bg-slate-900/90 border border-teal-500/30 w-full max-w-md p-8 rounded-3xl shadow-[0_0_35px_rgba(20,184,166,0.15)] backdrop-blur-md text-center">
        <div class="flex justify-center mb-6">
            <img src="space z logo.png" alt="Space Z Logo" class="w-32 h-32 object-contain">
        </div>
        <div class="mb-8">
            <h1 id="mainTitle" class="text-2xl font-bold text-zinc-100 mb-2">انضم إلى بوابة Space Z</h1>
            <p id="subTitle" class="text-sm text-zinc-400">أنشئ حسابك الجديد لتكون جزءاً من رحلتنا</p>
        </div>

        <form id="signupForm" class="space-y-4 text-right">
            <input type="text" id="firstName" placeholder="الاسم الأول" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
            <input type="text" id="lastName" placeholder="الاسم الأخير" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
            <input type="email" id="email" placeholder="البريد الإلكتروني" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
            <input type="text" id="phoneNumber" placeholder="رقم الهاتف" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
            <input type="password" id="password" placeholder="كلمة المرور" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
            <button type="submit" id="submitBtn" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3.5 rounded-xl text-sm">إنشاء الحساب ←</button>
            <p id="formMessage" class="hidden mt-3 text-sm"></p>
        </form>

        <div class="mt-6 text-sm text-zinc-400">
            <span id="haveAccount">لديك حساب بالفعل؟</span> <a href="login.html" id="loginLink" class="text-teal-400 hover:underline">تسجيل الدخول</a>
        </div>
    </div>

    <!-- OTP Modal -->
    <div id="otpModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden justify-center items-center z-50 p-4">
        <div class="bg-slate-900/95 border border-teal-500/30 w-full max-w-sm p-7 rounded-3xl shadow-[0_0_35px_rgba(20,184,166,0.18)] text-center">
            <h2 id="otpTitle" class="text-2xl font-bold text-zinc-100 mb-2">تحقق من بريدك</h2>
            <p id="otpDesc" class="text-sm text-zinc-400 mb-5">أدخل رمز التحقق المرسل إلى بريدك الإلكتروني</p>

            <input
                type="text"
                id="otpInput"
                maxlength="6"
                placeholder="000000"
                class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-center text-xl tracking-[0.35em] text-zinc-100 focus:outline-none focus:border-teal-500"
            >

            <button id="verifyOtpBtn" class="mt-5 w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3.5 rounded-xl text-sm">
                تأكيد الحساب
            </button>

            <button id="resendOtpBtn" disabled class="mt-3 w-full bg-slate-950/60 border border-slate-800 text-zinc-400 font-bold py-3 rounded-xl text-sm cursor-not-allowed">
                إعادة الإرسال بعد 40 ثانية
            </button>

            <p id="otpMessage" class="mt-4 text-sm text-zinc-400"></p>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:5000';
        let currentEmail = '';
        let resendTimer = null;
        let resendSeconds = 40;

        const translations = {
            ar: {
                title: "إنشاء حساب - Space Z",
                langBtn: "English",
                mainTitle: "انضم إلى بوابة Space Z",
                subTitle: "أنشئ حسابك الجديد لتكون جزءاً من رحلتنا",
                fName: "الاسم الأول",
                lName: "الاسم الأخير",
                email: "البريد الإلكتروني",
                phone: "رقم الهاتف",
                pass: "كلمة المرور",
                btn: "إنشاء الحساب ←",
                haveAcc: "لديك حساب بالفعل؟",
                logLink: "تسجيل الدخول",
                otpTitle: "تحقق من بريدك",
                otpDesc: "أدخل رمز التحقق المرسل إلى بريدك الإلكتروني",
                verifyBtn: "تأكيد الحساب",
                sending: "جاري إرسال رمز التحقق...",
                verifying: "جاري التحقق...",
                resendAfter: "إعادة الإرسال بعد",
                resend: "إعادة إرسال الرمز",
                accountDone: "تم تفعيل الحساب بنجاح",
                serverFail: "فشل الاتصال بالسيرفر"
            },
            en: {
                title: "Sign Up - Space Z",
                langBtn: "عربي",
                mainTitle: "Join Space Z Portal",
                subTitle: "Create your account to be part of our journey",
                fName: "First Name",
                lName: "Last Name",
                email: "Email",
                phone: "Phone Number",
                pass: "Password",
                btn: "Sign Up ←",
                haveAcc: "Already have an account?",
                logLink: "Log In",
                otpTitle: "Verify your email",
                otpDesc: "Enter the verification code sent to your email",
                verifyBtn: "Verify Account",
                sending: "Sending verification code...",
                verifying: "Verifying...",
                resendAfter: "Resend after",
                resend: "Resend code",
                accountDone: "Account verified successfully",
                serverFail: "Failed to connect to server"
            }
        };

        function showFormMessage(message, type = 'error') {
            const msg = document.getElementById('formMessage');
            msg.innerText = message;
            msg.classList.remove('hidden', 'text-red-400', 'text-teal-400', 'text-zinc-400');
            msg.classList.add(type === 'success' ? 'text-teal-400' : 'text-red-400');
        }

        function getLang() {
            return document.documentElement.getAttribute('lang') || 'ar';
        }

        function applyLanguage(lang) {
            document.documentElement.setAttribute('lang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            document.title = translations[lang].title;

            document.getElementById('langBtn').innerText = translations[lang].langBtn;
            document.getElementById('mainTitle').innerText = translations[lang].mainTitle;
            document.getElementById('subTitle').innerText = translations[lang].subTitle;
            document.getElementById('firstName').placeholder = translations[lang].fName;
            document.getElementById('lastName').placeholder = translations[lang].lName;
            document.getElementById('email').placeholder = translations[lang].email;
            document.getElementById('phoneNumber').placeholder = translations[lang].phone;
            document.getElementById('password').placeholder = translations[lang].pass;
            document.getElementById('submitBtn').innerText = translations[lang].btn;
            document.getElementById('haveAccount').innerText = translations[lang].haveAcc;
            document.getElementById('loginLink').innerText = translations[lang].logLink;

            document.getElementById('otpTitle').innerText = translations[lang].otpTitle;
            document.getElementById('otpDesc').innerText = translations[lang].otpDesc;
            document.getElementById('verifyOtpBtn').innerText = translations[lang].verifyBtn;

            localStorage.setItem('userLang', lang);
        }

        function openOtpModal(email) {
            currentEmail = email;
            document.getElementById('otpModal').classList.remove('hidden');
            document.getElementById('otpModal').classList.add('flex');
            document.getElementById('otpInput').value = '';
            document.getElementById('otpMessage').innerText = '';
            startResendCountdown();
        }

        function startResendCountdown() {
            const resendBtn = document.getElementById('resendOtpBtn');
            const lang = getLang();

            resendSeconds = 40;
            resendBtn.disabled = true;
            resendBtn.classList.add('cursor-not-allowed', 'text-zinc-400');
            resendBtn.classList.remove('text-teal-400', 'hover:bg-teal-500', 'hover:text-slate-950');

            clearInterval(resendTimer);

            resendBtn.innerText = `${translations[lang].resendAfter} ${resendSeconds} ${lang === 'ar' ? 'ثانية' : 's'}`;

            resendTimer = setInterval(() => {
                resendSeconds--;
                resendBtn.innerText = `${translations[lang].resendAfter} ${resendSeconds} ${lang === 'ar' ? 'ثانية' : 's'}`;

                if (resendSeconds <= 0) {
                    clearInterval(resendTimer);
                    resendBtn.disabled = false;
                    resendBtn.innerText = translations[lang].resend;
                    resendBtn.classList.remove('cursor-not-allowed', 'text-zinc-400');
                    resendBtn.classList.add('text-teal-400', 'hover:bg-teal-500', 'hover:text-slate-950');
                }
            }, 1000);
        }

        document.getElementById('langBtn').addEventListener('click', () => {
            const newLang = getLang() === 'ar' ? 'en' : 'ar';
            applyLanguage(newLang);
        });

        window.addEventListener('load', () => {
            applyLanguage(localStorage.getItem('userLang') || 'ar');
        });

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const lang = getLang();
            const submitBtn = document.getElementById('submitBtn');
            const originalText = submitBtn.innerText;

            const userData = {
                first_name: document.getElementById('firstName').value.trim(),
                last_name: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone_number: document.getElementById('phoneNumber').value.trim(),
                password: document.getElementById('password').value
            };

            submitBtn.disabled = true;
            submitBtn.innerText = translations[lang].sending;

            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    openOtpModal(userData.email);
                } else {
                    let errorMessage = result.detail || result.message || 'حدث خطأ';

if (errorMessage === 'Email already exists') {
    errorMessage = lang === 'ar'
        ? 'هذا البريد الإلكتروني مستخدم بالفعل، جرّب تسجيل الدخول.'
        : 'This email is already registered. Please log in.';
}

if (errorMessage === 'Phone already exists') {
    errorMessage = lang === 'ar'
        ? 'رقم الهاتف مستخدم بالفعل، تأكد من الرقم أو جرّب تسجيل الدخول.'
        : 'This phone number is already registered. Please check it or log in.';
}

showFormMessage(errorMessage, 'error');
                }
            } catch (err) {
                showFormMessage(translations[lang].serverFail, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = originalText;
            }
        });

        document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
            const lang = getLang();
            const otp = document.getElementById('otpInput').value.trim();
            const verifyBtn = document.getElementById('verifyOtpBtn');
            const msg = document.getElementById('otpMessage');
            const originalText = verifyBtn.innerText;

            if (otp.length !== 6) {
                msg.innerText = lang === 'ar' ? 'أدخل رمز مكون من 6 أرقام' : 'Enter a 6-digit code';
                msg.className = 'mt-4 text-sm text-red-400';
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.innerText = translations[lang].verifying;

            try {
                const response = await fetch(`${API_BASE}/api/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp: otp
                    })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    msg.innerText = translations[lang].accountDone;
                    msg.className = 'mt-4 text-sm text-teal-400';

                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1200);
                } else {
                    msg.innerText = result.detail || result.message || 'Invalid OTP';
                    msg.className = 'mt-4 text-sm text-red-400';
                }
            } catch (err) {
                msg.innerText = translations[lang].serverFail;
                msg.className = 'mt-4 text-sm text-red-400';
            } finally {
                verifyBtn.disabled = false;
                verifyBtn.innerText = originalText;
            }
        });

        document.getElementById('resendOtpBtn').addEventListener('click', async () => {
            const lang = getLang();
            const resendBtn = document.getElementById('resendOtpBtn');
            const msg = document.getElementById('otpMessage');

            if (!currentEmail || resendBtn.disabled) return;

            resendBtn.disabled = true;
            msg.innerText = lang === 'ar' ? 'جاري إعادة الإرسال...' : 'Resending...';
            msg.className = 'mt-4 text-sm text-zinc-400';

            try {
                const response = await fetch(`${API_BASE}/api/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    msg.innerText = lang === 'ar' ? 'تم إرسال رمز جديد' : 'New code sent';
                    msg.className = 'mt-4 text-sm text-teal-400';
                    startResendCountdown();
                } else {
                    msg.innerText = result.detail || result.message || 'Error';
                    msg.className = 'mt-4 text-sm text-red-400';
                    startResendCountdown();
                }
            } catch (err) {
                msg.innerText = translations[lang].serverFail;
                msg.className = 'mt-4 text-sm text-red-400';
                startResendCountdown();
            }
        });
    </script>
</body>
</html>
