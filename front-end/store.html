<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Store - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background:#060911; }
    .glass { background: rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter: blur(15px); }
  </style>
</head>
<body class="text-zinc-100 min-h-screen">

    <nav class="border-b border-slate-800 bg-slate-900/40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span> Store</div>
            <div class="flex gap-8 items-center text-sm font-medium">
                <a href="dashboard.html" class="hover:text-teal-400 transition" data-en="Dashboard" data-ar="لوحة التحكم">لوحة التحكم</a>
                <a href="home.html" class="hover:text-teal-400 transition" data-en="Home" data-ar="الرئيسية">الرئيسية</a>
                <a href="store.html" class="hover:text-teal-400 transition" data-en="store" data-ar="السوق">السوق</a>
                <button id="langToggle" class="border border-teal-500 text-teal-400 px-4 py-1.5 rounded-lg hover:bg-teal-500 hover:text-slate-900 transition font-bold">EN / AR</button>
            </div>
        </div>
    </nav>

<main class="max-w-7xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold mb-8">متجر الكورسات</h1>

  <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <p id="emptyMessage" class="hidden text-zinc-400 text-center mt-12">
    لا يوجد كورسات متاحة حالياً
  </p>
</main>

<div id="purchaseModal"
     class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4">

  <div class="glass w-full max-w-xl rounded-3xl p-6">

    <div class="flex justify-between items-center mb-5">
      <h2 class="text-2xl font-bold">شراء الكورس</h2>

      <button onclick="closePurchaseModal()"
        class="text-zinc-400 hover:text-red-400">
        ✕
      </button>
    </div>

    <div id="paymentMethodsContainer"></div>

    <input
      id="transferNumber"
      type="text"
      placeholder="رقم التحويلة"
      class="w-full mt-4 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">

    <p id="purchaseMessage"
       class="text-sm text-red-400 mt-3"></p>

    <button
      onclick="submitPurchase()"
      class="w-full mt-4 bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3 rounded-xl">

      إرسال الطلب
    </button>

  </div>
</div>

<script>
const API_BASE = "http://localhost:5000";

let coursesList = [];

async function loadCourses() {
  try {
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "login.html";
    }

    const res = await fetch(`${API_BASE}/api/store/courses`, {
      headers: {
        "Authorization": `Bearer ${token}`
      }
    });
    const data = await res.json();

    coursesList = (data.data || []).sort((a, b) => {
      if (a.isFeatured === b.isFeatured) {
        return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
      }
      return a.isFeatured ? -1 : 1;
    });

    if (!data.success || coursesList.length === 0) {
      emptyMessage.classList.remove("hidden");
      return;
    }

    emptyMessage.classList.add("hidden");
    coursesGrid.innerHTML = "";

    coursesList.forEach(course => {
      const card = document.createElement("div");
      card.className = "glass rounded-3xl overflow-hidden hover:border-teal-500 transition";

      card.innerHTML = `
        <div class="h-44 bg-slate-950 flex items-center justify-center">
          ${
            course.thumbnailUrl
              ? `<img src="${course.thumbnailUrl}" class="w-full h-full object-cover">`
              : `<span class="text-teal-400 text-4xl font-bold">SPACE Z</span>`
          }
        </div>

        <div class="p-5">
          <h2 class="text-xl font-bold mb-2">${course.title}</h2>
          <p class="text-zinc-400 text-sm mb-4 min-h-[45px]">
            ${course.description || "لا يوجد وصف"}
          </p>

          <div class="flex justify-between items-center">
            <span class="text-teal-400 font-bold">
              ${course.isPaid ? course.price + " JOD" : "مجاني"}
            </span>

            <button onclick="buyCourse(${course.id})"
  class="bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold px-4 py-2 rounded-xl">
  ${course.isPaid ? "شراء" : "تسجيل مجاني"}
</button>
          </div>
        </div>
      `;

      coursesGrid.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    emptyMessage.innerText = "فشل تحميل الكورسات";
    emptyMessage.classList.remove("hidden");
  }
}

let selectedCourseId = null;

async function buyCourse(courseId) {
  const course = coursesList.find(c => c.id === courseId);

  if (!course) return;

  if (!course.isPaid || course.price === 0) {
    await enrollFreeCourse(courseId);
    return;
  }

  selectedCourseId = courseId;
  loadPaymentMethods();

  document.getElementById("purchaseModal").classList.remove("hidden");
  document.getElementById("purchaseModal").classList.add("flex");
}

async function enrollFreeCourse(courseId) {
  const token = localStorage.getItem("token");

  const response = await fetch(`${API_BASE}/api/purchases`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    },
    body: JSON.stringify({
      course_id: courseId,
      transfer_number: "FREE-COURSE"
    })
  });

  const data = await response.json();

  if (!response.ok) {
    alert(data.detail || "حدث خطأ");
    return;
  }

  alert("تمت إضافة الكورس المجاني إلى حسابك");
  await loadCourses();
}

loadCourses();

function closePurchaseModal() {
    purchaseModal.classList.add("hidden");
    purchaseModal.classList.remove("flex");
}

async function loadPaymentMethods() {

    const res = await fetch(
        `${API_BASE}/api/payment-settings`
    );

    const data = await res.json();

    paymentMethodsContainer.innerHTML = "";

    data.data.forEach(payment => {

        paymentMethodsContainer.innerHTML += `
        <div class="border border-slate-800 rounded-xl p-4 mb-3">

            <h3 class="font-bold text-teal-400">
                ${payment.methodName}
            </h3>

            <p class="text-sm mt-2">
                ${payment.accountName || ""}
            </p>

            <p class="text-sm">
                ${payment.accountNumber}
            </p>

            <p class="text-xs text-zinc-400 mt-2">
                ${payment.instructions || ""}
            </p>

        </div>
        `;
    });
}

async function submitPurchase() {
    const transferNumberInput = document.getElementById("transferNumber");
    const purchaseMessage = document.getElementById("purchaseMessage");

    const transferNumber = transferNumberInput.value.trim();
    const token = localStorage.getItem("token");

    if (!token) {
        window.location.href = "login.html";
        return;
    }

    if (!transferNumber) {
        purchaseMessage.innerText = "أدخل رقم التحويلة";
        return;
    }

    const response = await fetch(
        `${API_BASE}/api/purchases`,
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
            },
            body: JSON.stringify({
                course_id: selectedCourseId,
                transfer_number: transferNumber
            })
        }
    );

    const data = await response.json();


    if (data.detail === "You already own this course") {
      purchaseMessage.innerText = "أنت تملك هذا الكورس بالفعل";
      return;
    }

    if (data.detail === "Transfer number already used") {
       purchaseMessage.innerText = "رقم التحويلة مستخدم مسبقاً";
       return;
    }

    if (!response.ok) {
        purchaseMessage.innerText = data.detail || "حدث خطأ";
        return;
    }

    purchaseMessage.className = "text-sm text-green-400 mt-3";
    purchaseMessage.innerText = "تم إرسال الطلب بنجاح";

    setTimeout(() => {
        closePurchaseModal();
    }, 1500);
}
</script>

</body>
</html>
