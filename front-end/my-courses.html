<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>My Courses - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Tajawal', sans-serif; background:#060911; }
    .glass { background:rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(15px); }
  </style>
</head>

<body class="text-zinc-100 min-h-screen">

<nav class="border-b border-slate-800 bg-slate-900/50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span> My Courses</div>
    <a href="dashboard.html" class="text-teal-400 hover:underline">لوحة التحكم</a>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-10">
  <h1 class="text-3xl font-bold mb-8">كورساتي</h1>

  <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <p id="emptyMessage" class="hidden text-zinc-400 text-center mt-12">
    لا تملك أي كورسات حالياً
  </p>
</main>

<script>
const API_BASE = "http://localhost:5000";

async function loadMyCourses() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "login.html";
    return;
  }

  const res = await fetch(`${API_BASE}/api/my-courses`, {
    headers: {
      "Authorization": `Bearer ${token}`
    }
  });

  const data = await res.json();

  if (!data.success || data.data.length === 0) {
    emptyMessage.classList.remove("hidden");
    return;
  }

  coursesGrid.innerHTML = "";

  data.data.forEach(item => {
    const course = item.course;

    const card = document.createElement("div");
    card.className = "glass rounded-3xl overflow-hidden hover:border-teal-500 transition";

    card.innerHTML = `
      <div class="h-44 bg-slate-950 flex items-center justify-center">
        ${
          course.thumbnailUrl
            ? `<img src="${course.thumbnailUrl}" class="w-full h-full object-cover">`
            : `<span class="text-teal-400 text-4xl font-bold">SPACE Z</span>`
        }
      </div>

      <div class="p-5">
        <h2 class="text-xl font-bold mb-2">${course.title}</h2>

        <p class="text-zinc-400 text-sm mb-4 min-h-[45px]">
          ${course.description || "لا يوجد وصف"}
        </p>

        <p class="text-xs text-zinc-500 mb-4">
          تاريخ التسجيل: ${new Date(item.enrolledAt).toLocaleString()}
        </p>

        <button onclick="openCourse(${course.id})"
          class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3 rounded-xl">
          دخول الكورس
        </button>
      </div>
    `;

    coursesGrid.appendChild(card);
  });
}

function openCourse(courseId) {
  window.location.href = `course-view.html?id=${courseId}`;
}

loadMyCourses();
</script>

</body>
</html>
