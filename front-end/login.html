<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { tajawal: ['Tajawal', 'sans-serif'], },
                    colors: { spaceBgStart: '#09101d', spaceBgEnd: '#060911', cardBg: '#0f172a', mintTeal: '#14b8a6', mintTealHover: '#0d9488' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #09101d, #060911); }

        /* ===== Modal Enhancements ===== */
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalScaleIn {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalIconPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulseRing {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(0.95); opacity: 0; }
        }

        .modal-overlay {
            animation: modalFadeIn 0.3s ease-out;
        }
        .modal-content {
            animation: modalScaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-icon-wrap {
            animation: modalIconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
        }
        .modal-icon-ring {
            animation: pulseRing 2s ease-out infinite;
        }

        /* Gradient border effect */
        .modal-gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.95));
        }
        .modal-gradient-border::before {
            content: '';
            position: absolute;
            inset: 0;
            padding: 1px;
            border-radius: inherit;
            background: linear-gradient(135deg, rgba(20, 184, 166, 0.6), rgba(20, 184, 166, 0.1), rgba(20, 184, 166, 0.6));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Input focus glow */
        .modal-input {
            transition: all 0.3s ease;
            position: relative;
        }
        .modal-input:focus {
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15), 0 0 20px rgba(20, 184, 166, 0.1);
            transform: translateY(-1px);
        }

        /* Button shine effect */
        .modal-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }
        .modal-btn:hover::before {
            left: 100%;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.4), 0 0 20px rgba(20, 184, 166, 0.2);
        }
        .modal-btn:active {
            transform: translateY(0);
        }

        /* Close button */
        .modal-close-btn {
            transition: all 0.3s ease;
        }
        .modal-close-btn:hover {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
            transform: rotate(90deg);
        }

        /* Floating particles background */
        .modal-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0.4;
        }
        .modal-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #14b8a6;
            border-radius: 50%;
            animation: floatParticle 8s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100%) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100%) translateX(20px); opacity: 0; }
        }

        /* Success state */
        .success-shake {
            animation: successShake 0.5s ease;
        }
        @keyframes successShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>

        sendResetOtp: "إرسال رمز التحقق",

    en: {
        title: "Space Z Education Portal",
        langBtn: "عربي",
        welcome: "Space Z Education Portal",
        subtitle: "Welcome back, log in to continue your journey",
        labelUser: "Email or Phone Number",
        labelPass: "Password",
        loginBtn: "Login",
        checking: "Checking...",
        or: "Or log in with",
        noAccount: "Don't have an account yet?",
        registerLink: "Create a new account",
        googleLang: "en_US",
        invalid: "Email/phone or password is incorrect",
        banned: "This account is banned",
        deviceLimit: "Device limit reached: this account can only be used on 2 devices",
        googleFail: "Google login failed",
        serverFail: "Failed to connect to server",
        forgotBtn: "Forgot password?",
forgotTitle: "Reset Password",
forgotDesc: "Enter your email to receive a verification code",
sendResetOtp: "Send verification code",
resetPassword: "Change password",
close: "Close"
    }
};

function getLang() {
    return document.documentElement.getAttribute('lang') || 'ar';
}

function showLoginMessage(message, type = 'error') {
    const msg = document.getElementById('loginMessage');
    msg.innerText = message;
    msg.classList.remove('hidden', 'text-red-400', 'text-teal-400', 'text-zinc-400');
    msg.classList.add(type === 'success' ? 'text-teal-400' : 'text-red-400');
}

function mapErrorMessage(detail) {
    const lang = getLang();
    const t = translations[lang];

    if (!detail) return t.serverFail;
    if (detail === 'Invalid credentials') return t.invalid;
    if (detail === 'Account is banned') return t.banned;
    if (detail.includes('Device limit reached')) return t.deviceLimit;
    if (detail === 'Please login with Google') {
        return lang === 'ar'
            ? 'هذا الحساب مسجل بواسطة جوجل، استخدم زر جوجل للدخول'
            : 'This account uses Google login. Please use Google sign-in.';
    }
    if (detail === 'Phone already exists') {
        return lang === 'ar'
            ? 'رقم الهاتف مستخدم بالفعل'
            : 'Phone number already exists';
    }

    return detail;
}

function renderGoogleButton(lang) {
    const googleBtn = document.getElementById('googleLoginBtn');
    if (googleBtn && window.google) {
        googleBtn.innerHTML = "";
        google.accounts.id.renderButton(googleBtn, {
            theme: "outline",
            size: "large",
            width: 320,
            text: "continue_with",
            locale: lang
        });
    }
}

function updateUI(lang) {
    const trans = translations[lang];

    document.documentElement.setAttribute('lang', lang);
    document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    document.title = trans.title;

    document.getElementById('langBtn').innerText = trans.langBtn;
    document.querySelector('main h1').innerText = trans.welcome;
    document.querySelector('main p').innerText = trans.subtitle;

    const labels = document.querySelectorAll('form label');
    labels[0].innerText = trans.labelUser;
    labels[1].innerText = trans.labelPass;

    document.querySelector('form button span').innerText = trans.loginBtn;
    document.getElementById('orText').innerText = trans.or;
    document.getElementById('noAccountText').innerText = trans.noAccount;
    document.getElementById('registerLink').innerText = trans.registerLink;
    document.getElementById('forgotPasswordBtn').innerText = trans.forgotBtn;
document.querySelector('#forgotModal h2').innerText = trans.forgotTitle;
document.getElementById('forgotDesc').innerText = trans.forgotDesc;
document.getElementById('sendResetOtpBtn').innerText = trans.sendResetOtp;
document.getElementById('resetPasswordBtn').innerText = trans.resetPassword;

    const idInput = document.getElementById('identifier');
    const formElement = document.getElementById('loginForm');
    const btnArrow = document.getElementById('btnArrow');

    if (lang === 'en') {
        idInput.classList.remove('text-right');
        idInput.classList.add('text-left');
        formElement.classList.remove('text-right');
        formElement.classList.add('text-left');
        btnArrow.classList.remove('rotate-180');
    } else {
        idInput.classList.remove('text-left');
        idInput.classList.add('text-right');
        formElement.classList.remove('text-left');
        formElement.classList.add('text-right');
        btnArrow.classList.add('rotate-180');
    }

    renderGoogleButton(trans.googleLang);
}

function getDeviceFingerprint() {
    const navigatorInfo =
        window.navigator.userAgent +
        window.navigator.language +
        window.screen.colorDepth +
        window.screen.width +
        window.screen.height;

    let hash = 0;
    for (let i = 0; i < navigatorInfo.length; i++) {
        hash = ((hash << 5) - hash) + navigatorInfo.charCodeAt(i);
        hash |= 0;
    }

    return 'DEV-' + Math.abs(hash);
}

function saveSessionAndRedirect(data, deviceId = null) {
    const user = data.user || {};

    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(user));

    if (deviceId) {
        localStorage.setItem('deviceId', deviceId);
    }

    if (user.role && user.role.toLowerCase() === 'admin') {
        window.location.href = 'admin-dashboard.html';
    } else {
        window.location.href = 'dashboard.html';
    }
}

function openPhoneModal() {
    document.getElementById('phoneModal').classList.remove('hidden');
    document.getElementById('phoneModal').classList.add('flex');
}

async function handleCredentialResponse(response) {
    const lang = getLang();
    const googleToken = response.credential;
    const deviceId = getDeviceFingerprint();

    try {
        const res = await fetch(`${API_BASE}/api/auth/google-login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                idToken: googleToken,
                deviceId: deviceId
            })
        });

        const data = await res.json();

        if (!res.ok) {
            showLoginMessage(mapErrorMessage(data.detail || data.message), 'error');
            return;
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        localStorage.setItem('deviceId', deviceId);

        if (data.requiresPhoneNumber) {
            openPhoneModal();
        } else {
            saveSessionAndRedirect(data, deviceId);
        }

    } catch (error) {
        console.error(error);
        showLoginMessage(translations[lang].googleFail, 'error');
    }
}

document.getElementById('langBtn').addEventListener('click', () => {
    const newLang = getLang() === 'ar' ? 'en' : 'ar';
    localStorage.setItem('userLang', newLang);
    updateUI(newLang);
});

window.addEventListener('load', () => {
    const savedLang = localStorage.getItem('userLang') || 'ar';

    google.accounts.id.initialize({
        client_id: "872959715248-i7d0r6f7luj8vuraut76um6oaahgtj02.apps.googleusercontent.com",
        callback: handleCredentialResponse,
        use_fedcm: false
    });

    updateUI(savedLang);

    document.getElementById('savePhoneBtn').addEventListener('click', async () => {
        const phone = document.getElementById('completePhoneInput').value.trim();
        const msg = document.getElementById('phoneMessage');
        const token = localStorage.getItem('token');

        if (!phone) {
            msg.innerText = getLang() === 'ar' ? 'أدخل رقم الهاتف' : 'Enter phone number';
            msg.className = 'mt-4 text-sm text-red-400';
            return;
        }

        try {
            const response = await fetch(`${API_BASE}/api/users/complete-phone`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    phone_number: phone
                })
            });

            const data = await response.json();

            if (!response.ok) {
                msg.innerText = mapErrorMessage(data.detail || data.message);
                msg.className = 'mt-4 text-sm text-red-400';
                return;
            }

            const user = JSON.parse(localStorage.getItem('user') || '{}');
            user.phoneNumber = phone;
            localStorage.setItem('user', JSON.stringify(user));

            window.location.href = 'dashboard.html';
        } catch (err) {
            console.error(err);
            msg.innerText = translations[getLang()].serverFail;
            msg.className = 'mt-4 text-sm text-red-400';
        }
    });
});

document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const lang = getLang();
    const identifier = document.getElementById('identifier').value.trim();
    const password = document.getElementById('password').value;
    const deviceId = getDeviceFingerprint();

    const loginBtn = document.querySelector('form button');
    const originalBtnText = loginBtn.innerHTML;

    loginBtn.disabled = true;
    loginBtn.innerHTML = `<span>${translations[lang].checking}</span>`;

    try {
        const response = await fetch(`${API_BASE}/api/auth/login`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                identifier,
                password,
                deviceId
            })
        });

        const data = await response.json();

        if (!response.ok) {
            showLoginMessage(mapErrorMessage(data.detail || data.message), 'error');
            return;
        }

        saveSessionAndRedirect(data, deviceId);
    } catch (error) {
        console.error(error);
        showLoginMessage(translations[lang].serverFail, 'error');
    } finally {
        loginBtn.disabled = false;
        loginBtn.innerHTML = originalBtnText;
    }
});
function openForgotModal() {
    document.getElementById('forgotModal').classList.remove('hidden');
    document.getElementById('forgotModal').classList.add('flex');
    document.getElementById('forgotStepEmail').classList.remove('hidden');
    document.getElementById('forgotStepReset').classList.add('hidden');
    document.getElementById('forgotMessage').innerText = '';
}

function closeForgotModal() {
    document.getElementById('forgotModal').classList.add('hidden');
    document.getElementById('forgotModal').classList.remove('flex');
}

document.getElementById('forgotPasswordBtn').addEventListener('click', () => {
    const identifierValue = document.getElementById('identifier').value.trim();

    if (identifierValue.includes('@')) {
        document.getElementById('forgotEmailInput').value = identifierValue;
    }

    openForgotModal();
});

document.getElementById('sendResetOtpBtn').addEventListener('click', async () => {
    const email = document.getElementById('forgotEmailInput').value.trim();
    const msg = document.getElementById('forgotMessage');
    const btn = document.getElementById('sendResetOtpBtn');
    const originalText = btn.innerText;

    if (!email) {
        msg.innerText = 'أدخل البريد الإلكتروني';
        msg.className = 'mt-4 text-sm text-red-400';
        return;
    }

    btn.disabled = true;
    btn.innerText = 'جاري الإرسال...';

    try {
        const response = await fetch(`${API_BASE}/api/auth/forgot-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email })
        });

        const data = await response.json();

        if (!response.ok) {
            msg.innerText = mapErrorMessage(data.detail || data.message);
            msg.className = 'mt-4 text-sm text-red-400';
            return;
        }

        msg.innerText = 'تم إرسال رمز التحقق إلى بريدك';
        msg.className = 'mt-4 text-sm text-teal-400';

        document.getElementById('forgotStepEmail').classList.add('hidden');
        document.getElementById('forgotStepReset').classList.remove('hidden');
    } catch (err) {
        console.error(err);
        msg.innerText = 'فشل الاتصال بالسيرفر';
        msg.className = 'mt-4 text-sm text-red-400';
    } finally {
        btn.disabled = false;
        btn.innerText = originalText;
    }
});

document.getElementById('resetPasswordBtn').addEventListener('click', async () => {
    const email = document.getElementById('forgotEmailInput').value.trim();
    const otp = document.getElementById('resetOtpInput').value.trim();
    const newPassword = document.getElementById('newPasswordInput').value;
    const msg = document.getElementById('forgotMessage');
    const btn = document.getElementById('resetPasswordBtn');
    const originalText = btn.innerText;

    if (!otp || !newPassword) {
        msg.innerText = 'أدخل الرمز وكلمة المرور الجديدة';
        msg.className = 'mt-4 text-sm text-red-400';
        return;
    }

    btn.disabled = true;
    btn.innerText = 'جاري التغيير...';

    try {
        const response = await fetch(`${API_BASE}/api/auth/reset-password`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email,
                otp,
                new_password: newPassword
            })
        });

        const data = await response.json();

        if (!response.ok) {
            msg.innerText = mapErrorMessage(data.detail || data.message);
            msg.className = 'mt-4 text-sm text-red-400';
            return;
        }

        msg.innerText = 'تم تغيير كلمة المرور بنجاح، يمكنك تسجيل الدخول الآن';
        msg.className = 'mt-4 text-sm text-teal-400';

        setTimeout(() => {
            closeForgotModal();
        }, 1500);
    } catch (err) {
        console.error(err);
        msg.innerText = 'فشل الاتصال بالسيرفر';
        msg.className = 'mt-4 text-sm text-red-400';
    } finally {
        btn.disabled = false;
        btn.innerText = originalText;
    }
});

        document.getElementById('phoneModal').classList.add('hidden');
        document.getElementById('phoneModal').classList.remove('flex');
    }
});

document.querySelector('#phoneModal .modal-close-btn').addEventListener('click', () => {
    document.getElementById('phoneModal').classList.add('hidden');
    document.getElementById('phoneModal').classList.remove('flex');
});

// زر X في Forgot Modal
document.getElementById('closeForgotModalBtn').addEventListener('click', () => {
    closeForgotModal();
});

// إغلاق Forgot Modal عند الضغط على الخلفية
document.getElementById('forgotModal').addEventListener('click', (e) => {
    if (e.target.id === 'forgotModal') {
        closeForgotModal();
    }
});
