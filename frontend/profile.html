<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Profile - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Tajawal', sans-serif; background:#060911; }
    .glass { background:rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(15px); }
  </style>
</head>

<body class="text-zinc-100 min-h-screen">

<nav class="border-b border-slate-800 bg-slate-900/50">
  <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
    <a href="dashboard.html" class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span> <span class="text-2xl font-bold text-teal-400">profile</span></a>
    <div class="flex items-center gap-4">
      <button id="langBtn" class="text-sm text-zinc-400 hover:text-teal-400">English</button>
      <a href="dashboard.html" id="navDashboard" class="text-teal-400 hover:underline">لوحة التحكم</a>
    </div>
  </div>
</nav>

<main class="max-w-5xl mx-auto px-6 py-10">

  <h1 id="titleProfile" class="text-3xl font-bold mb-8">الملف الشخصي</h1>

  <section class="glass p-6 rounded-3xl mb-8">
    <h2 id="accInfo" class="text-xl font-bold mb-5">معلومات الحساب</h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
      <p><span class="text-zinc-400" id="labelName">الاسم:</span> <span id="fullName">...</span></p>
      <p><span class="text-zinc-400" id="labelEmail">الإيميل:</span> <span id="email">...</span></p>
      <p><span class="text-zinc-400" id="labelPhone">الهاتف:</span> <span id="phoneNumber">...</span></p>
      <p><span class="text-zinc-400" id="labelRole">الصلاحية:</span> <span id="role">...</span></p>
    </div>
  </section>

  <section class="glass p-6 rounded-3xl mb-8">
    <h2 id="changePassTitle" class="text-xl font-bold mb-5">تغيير كلمة المرور</h2>
    <div class="space-y-4">
      <input id="currentPassword" type="password" placeholder="كلمة المرور الحالية" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">
      <input id="newPassword" type="password" placeholder="كلمة المرور الجديدة" class="w-full bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">
      <p id="passwordMessage" class="text-sm text-red-400"></p>
      <button id="changePassBtn" onclick="changePassword()" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3 rounded-xl">تغيير كلمة المرور</button>
    </div>
  </section>

  <button id="logoutBtn" onclick="logoutDevice()" class="w-full bg-red-500/10 border border-red-500 text-red-400 py-3 rounded-xl hover:bg-red-500 hover:text-white">تسجيل الخروج </button>
</main>

<footer class="w-full text-center py-6 border-t border-slate-800 bg-slate-900 text-slate-400 text-xs">
    <p>
        © 2026 Space Z. All rights reserved. Created by 
        <a 
            href="https://www.instagram.com/code._.stream" 
            target="_blank" 
            class="text-blue-400 hover:text-blue-300 font-bold transition-colors duration-200 underline underline-offset-4 decoration-blue-400/30"
        >
            @code._.stream
        </a>
    </p>
</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/profile.js"></script>

</body>
</html>
