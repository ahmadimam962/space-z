<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - Space Z</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #09101d, #060911); }
    </style>
</head>
<body class="text-zinc-100 min-h-screen flex flex-col">

    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span></a>
            <button id="langBtn" class="bg-slate-900/80 text-zinc-300 hover:text-teal-400 px-4 py-1.5 rounded-full text-sm border border-slate-800">English</button>
        </div>
    </nav>

    <main class="flex-grow flex flex-col justify-center items-center p-4">
        <div class="bg-slate-900/90 border border-teal-500/30 w-full max-w-md p-8 rounded-3xl shadow-[0_0_35px_rgba(20,184,166,0.15)] backdrop-blur-md text-center">
            <div class="flex justify-center mb-6">
                <img src="space z logo (1).png" alt="Space Z Logo" class="w-32 h-32 object-contain">
            </div>
            <div class="mb-8">
                <h1 id="mainTitle" class="text-2xl font-bold text-zinc-100 mb-2">انضم إلى بوابة Space Z</h1>
                <p id="subTitle" class="text-sm text-zinc-400">أنشئ حسابك الجديد لتكون جزءاً من رحلتنا</p>
            </div>

            <form id="signupForm" class="space-y-4 text-right">
                <input type="text" id="firstName" placeholder="الاسم الأول" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
                <input type="text" id="lastName" placeholder="الاسم الأخير" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
                <input type="email" id="email" placeholder="البريد الإلكتروني" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
                <input type="text" id="phoneNumber" placeholder="رقم الهاتف" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
                <input type="password" id="password" placeholder="كلمة المرور" required class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100">
                <button type="submit" id="submitBtn" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3.5 rounded-xl text-sm">إنشاء الحساب ←</button>
                <p id="formMessage" class="hidden mt-3 text-sm"></p>
            </form>

            <div class="mt-6 text-sm text-zinc-400">
                <span id="haveAccount">لديك حساب بالفعل؟</span> <a href="login.html" id="loginLink" class="text-teal-400 hover:underline">تسجيل الدخول</a>
            </div>
        </div>
    </main>

    <div id="otpModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm hidden justify-center items-center z-50 p-4">
        <div class="bg-slate-900/95 border border-teal-500/30 w-full max-w-sm p-7 rounded-3xl shadow-[0_0_35px_rgba(20,184,166,0.18)] text-center">
            <h2 id="otpTitle" class="text-2xl font-bold text-zinc-100 mb-2">تحقق من بريدك</h2>
            <p id="otpDesc" class="text-sm text-zinc-400 mb-5">أدخل رمز التحقق المرسل إلى بريدك الإلكتروني</p>
            <input type="text" id="otpInput" maxlength="6" placeholder="000000" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-center text-xl tracking-[0.35em] text-zinc-100 focus:outline-none focus:border-teal-500">
            <button id="verifyOtpBtn" class="mt-5 w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3.5 rounded-xl text-sm">تأكيد الحساب</button>
            <button id="resendOtpBtn" disabled class="mt-3 w-full bg-slate-950/60 border border-slate-800 text-zinc-400 font-bold py-3 rounded-xl text-sm cursor-not-allowed">إعادة الإرسال بعد 40 ثانية</button>
            <p id="otpMessage" class="mt-4 text-sm text-zinc-400"></p>
        </div>
    </div>

    <footer class="w-full text-center py-6 border-t border-slate-800 bg-slate-900 text-slate-400 text-xs">
    <p>
        © 2026 Space Z. All rights reserved. Created by 
        <a 
            href="https://www.instagram.com/code._.stream" 
            target="_blank" 
            class="text-blue-400 hover:text-blue-300 font-bold transition-colors duration-200 underline underline-offset-4 decoration-blue-400/30"
        >
            @code._.stream
        </a>
    </p>
</footer>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/register.js"></script>

</body>
</html>
