<!DOCTYPE html>
<html lang="ar" dir="rtl" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة Space Z التعليمية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { tajawal: ['Tajawal', 'sans-serif'], },
                    colors: { spaceBgStart: '#09101d', spaceBgEnd: '#060911', cardBg: '#0f172a', mintTeal: '#14b8a6', mintTealHover: '#0d9488' }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: linear-gradient(135deg, #09101d, #060911); }

        /* ===== Modal Enhancements ===== */
        @keyframes modalFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes modalScaleIn {
            from { opacity: 0; transform: scale(0.92) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        @keyframes modalIconPop {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        @keyframes pulseRing {
            0% { transform: scale(0.95); opacity: 0.7; }
            70% { transform: scale(1.3); opacity: 0; }
            100% { transform: scale(0.95); opacity: 0; }
        }

        .modal-overlay {
            animation: modalFadeIn 0.3s ease-out;
        }
        .modal-content {
            animation: modalScaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal-icon-wrap {
            animation: modalIconPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.15s both;
        }
        .modal-icon-ring {
            animation: pulseRing 2s ease-out infinite;
        }

        /* Gradient border effect */
        .modal-gradient-border {
            position: relative;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.98), rgba(15, 23, 42, 0.95));
        }
        .modal-gradient-border::before {
    content: '';
    position: absolute;
    inset: 0;
    padding: 1px;
    border-radius: inherit;
    background: linear-gradient(135deg, rgba(20, 184, 166, 0.6), rgba(20, 184, 166, 0.1), rgba(20, 184, 166, 0.6));
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    mask-composite: exclude;
    pointer-events: none;
}

        /* Input focus glow */
        .modal-input {
            transition: all 0.3s ease;
            position: relative;
        }
        .modal-input:focus {
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.15), 0 0 20px rgba(20, 184, 166, 0.1);
            transform: translateY(-1px);
        }

        /* Button shine effect */
        .modal-btn {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .modal-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transition: left 0.6s ease;
        }
        .modal-btn:hover::before {
            left: 100%;
        }
        .modal-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(20, 184, 166, 0.4), 0 0 20px rgba(20, 184, 166, 0.2);
        }
        .modal-btn:active {
            transform: translateY(0);
        }

        /* Close button */
        .modal-close-btn {
            transition: all 0.3s ease;
        }
        .modal-close-btn:hover {
            background: rgba(20, 184, 166, 0.1);
            color: #14b8a6;
            transform: rotate(90deg);
        }

        /* Floating particles background */
        .modal-particles {
            position: absolute;
            inset: 0;
            overflow: hidden;
            border-radius: inherit;
            pointer-events: none;
            opacity: 0.4;
        }
        .modal-particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #14b8a6;
            border-radius: 50%;
            animation: floatParticle 8s linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100%) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100%) translateX(20px); opacity: 0; }
        }

        /* Success state */
        .success-shake {
            animation: successShake 0.5s ease;
        }
        @keyframes successShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>
</head>
<body class="text-zinc-100 h-full flex flex-col justify-between overflow-x-hidden">

    <header class="w-full max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
    <span class="text-2xl font-bold tracking-wider text-teal-400">
        SPACE <span class="text-zinc-100">Z</span>
    </span>
</a>
        </div>
        <button id="langBtn" class="bg-slate-900/80 hover:bg-slate-800 text-zinc-300 hover:text-teal-400 px-4 py-1.5 rounded-full text-sm font-medium border border-slate-800 transition-all duration-300">
            English
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 py-4">
        <div class="bg-slate-900/90 border border-teal-500/30 w-full max-w-md p-8 md:p-10 rounded-3xl shadow-[0_0_35px_rgba(20,184,166,0.15)] backdrop-blur-md transition-all duration-300 text-center">
            <div class="flex justify-center mb-6 relative">
                <div class="absolute inset-0 bg-teal-500/20 blur-xl rounded-full w-20 h-20 mx-auto filter"></div>
                <img src="space z logo (1).png" alt="Space Z Logo" class="w-44 h-44 object-contain relative z-10">
            </div>
            <div class="mb-8">
                <h1 class="text-2xl md:text-3xl font-bold text-zinc-100 mb-2 tracking-wide">بوابة Space Z التعليمية</h1>
                <p class="text-sm text-zinc-400">أهلاً بك مجدداً، سجّل دخولك لتكمل رحلتك</p>
            </div>
            <form id="loginForm" class="space-y-5 text-right">
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-2 tracking-wide pr-1">البريد الإلكتروني أو الهاتف</label>
                    <input type="text" id="identifier" required placeholder="name@spacez.com" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all duration-300 text-right">
                </div>
                <div>
                    <label class="block text-xs font-medium text-zinc-400 mb-2 tracking-wide pr-1">كلمة المرور</label>
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 text-sm text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500 focus:ring-1 focus:ring-teal-500 transition-all duration-300 text-left">
                    <div class="text-left mt-2">
                      <button type="button" id="forgotPasswordBtn" class="text-xs text-teal-400 hover:underline">
                         نسيت كلمة المرور؟
                      </button>
                </div>
                </div>

                <button type="submit" class="w-full bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 transition-all duration-300 shadow-lg shadow-teal-500/20 active:scale-[0.99]">
                    <span>تسجيل الدخول</span>
                    <svg class="w-4 h-4 transform rotate-180" id="btnArrow" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
                <p id="loginMessage" class="hidden mt-3 text-sm text-center"></p>
            </form>
            <div class="relative flex py-5 items-center">
                <div class="flex-grow border-t border-slate-800"></div>
                <span id="orText" class="flex-shrink mx-4 text-xs text-zinc-500">أو يمكنك الدخول عبر</span>
                <div class="flex-grow border-t border-slate-800"></div>
            </div>
            <div id="googleLoginBtn" class="w-full flex justify-center mt-4 min-h-[44px]"></div>
            <div class="footer-link text-zinc-500 text-sm mt-4">
                <span id="noAccountText">ليس لديك حساب؟</span> 
                <a href="register.html" id="registerLink" class="text-teal-400 hover:underline">إنشاء حساب جديد</a>
            </div>
        </div>
    </main>

   <footer class="w-full text-center py-6 border-t border-slate-800 bg-slate-900 text-slate-400 text-xs">
    <p>
        © 2026 Space Z. All rights reserved. Created by 
        <a 
            href="https://www.instagram.com/code._.stream" 
            target="_blank" 
            class="text-blue-400 hover:text-blue-300 font-bold transition-colors duration-200 underline underline-offset-4 decoration-blue-400/30"
        >
            @code._.stream
        </a>
    </p>
</footer>

<!-- ===== Phone Modal (Professional) ===== -->
<div id="phoneModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden justify-center items-center z-50 p-4 modal-overlay">
    <div class="modal-gradient-border w-full max-w-sm p-8 rounded-3xl shadow-[0_25px_60px_rgba(0,0,0,0.5),0_0_40px_rgba(20,184,166,0.2)] text-center modal-content relative overflow-hidden">
        
        <!-- Floating particles -->
        <div class="modal-particles">
            <span class="modal-particle" style="left: 10%; animation-delay: 0s;"></span>
            <span class="modal-particle" style="left: 30%; animation-delay: 2s;"></span>
            <span class="modal-particle" style="left: 50%; animation-delay: 4s;"></span>
            <span class="modal-particle" style="left: 70%; animation-delay: 1s;"></span>
            <span class="modal-particle" style="left: 90%; animation-delay: 3s;"></span>
        </div>

        <!-- Close button -->
        <button onclick="document.getElementById('phoneModal').classList.add('hidden'); document.getElementById('phoneModal').classList.remove('flex');" class="modal-close-btn absolute top-4 left-4 w-8 h-8 rounded-full flex items-center justify-center text-zinc-500 hover:text-teal-400 z-10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <!-- Icon -->
        <div class="relative flex justify-center mb-5">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-20 h-20 rounded-full bg-teal-500/20 modal-icon-ring"></div>
            </div>
            <div class="modal-icon-wrap relative w-20 h-20 rounded-full bg-gradient-to-br from-teal-500/20 to-teal-500/5 border border-teal-500/30 flex items-center justify-center backdrop-blur-sm">
                <svg class="w-10 h-10 text-teal-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-zinc-100 mb-2 tracking-wide">أكمل معلوماتك</h2>
        <p class="text-sm text-zinc-400 mb-6">أدخل رقم هاتفك للمتابعة</p>

        <div class="relative">
            <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                <svg class="w-5 h-5 text-teal-500/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            </div>
            <input
                type="text"
                id="completePhoneInput"
                placeholder="0790000000"
                class="modal-input w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 pr-12 text-center text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500"
            >
        </div>

        <button id="savePhoneBtn" class="modal-btn mt-6 w-full bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-950 font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-lg shadow-teal-500/30">
            <span>حفظ ومتابعة</span>
            <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
        </button>

        <p id="phoneMessage" class="mt-4 text-sm text-zinc-400 min-h-[20px]"></p>
    </div>
</div>

<!-- ===== Forgot Password Modal (Professional) ===== -->
<div id="forgotModal" class="fixed inset-0 bg-black/80 backdrop-blur-md hidden justify-center items-center z-50 p-4 modal-overlay">
    <div class="modal-gradient-border w-full max-w-sm p-8 rounded-3xl shadow-[0_25px_60px_rgba(0,0,0,0.5),0_0_40px_rgba(20,184,166,0.2)] text-center modal-content relative overflow-hidden">
        
        <!-- Floating particles -->
        <div class="modal-particles">
            <span class="modal-particle" style="left: 15%; animation-delay: 0.5s;"></span>
            <span class="modal-particle" style="left: 40%; animation-delay: 2.5s;"></span>
            <span class="modal-particle" style="left: 65%; animation-delay: 1.5s;"></span>
            <span class="modal-particle" style="left: 85%; animation-delay: 3.5s;"></span>
        </div>

        <!-- Close button -->
        <button id="closeForgotModalBtn" class="modal-close-btn absolute top-4 left-4 w-8 h-8 rounded-full flex items-center justify-center text-zinc-500 hover:text-teal-400 z-10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>

        <!-- Icon -->
        <div class="relative flex justify-center mb-5">
            <div class="absolute inset-0 flex items-center justify-center">
                <div class="w-20 h-20 rounded-full bg-teal-500/20 modal-icon-ring"></div>
            </div>
            <div class="modal-icon-wrap relative w-20 h-20 rounded-full bg-gradient-to-br from-teal-500/20 to-teal-500/5 border border-teal-500/30 flex items-center justify-center backdrop-blur-sm">
                <svg class="w-10 h-10 text-teal-400" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
        </div>

        <h2 class="text-2xl font-bold text-zinc-100 mb-2 tracking-wide">استعادة كلمة المرور</h2>
        <p id="forgotDesc" class="text-sm text-zinc-400 mb-6">أدخل بريدك الإلكتروني لإرسال رمز التحقق</p>

        <div id="forgotStepEmail">
            <div class="relative">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-teal-500/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
                </div>
                <input
                    type="email"
                    id="forgotEmailInput"
                    placeholder="name@spacez.com"
                    class="modal-input w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 pr-12 text-center text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500"
                >
            </div>

            <button id="sendResetOtpBtn" class="modal-btn mt-6 w-full bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-950 font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-lg shadow-teal-500/30">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                <span>إرسال رمز التحقق</span>
            </button>
        </div>

        <div id="forgotStepReset" class="hidden">
            <div class="relative mb-3">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-teal-500/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
                </div>
                <input
                    type="text"
                    id="resetOtpInput"
                    maxlength="6"
                    placeholder="رمز التحقق"
                    class="modal-input w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 pr-12 text-center text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500 tracking-[0.5em] font-mono"
                >
            </div>

            <div class="relative">
                <div class="absolute inset-y-0 right-4 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-teal-500/60" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <input
                    type="password"
                    id="newPasswordInput"
                    placeholder="كلمة المرور الجديدة"
                    class="modal-input w-full bg-slate-950/60 border border-slate-800 rounded-xl px-4 py-3.5 pr-12 text-center text-zinc-100 placeholder-zinc-600 focus:outline-none focus:border-teal-500"
                >
            </div>

            <button id="resetPasswordBtn" class="modal-btn mt-6 w-full bg-gradient-to-r from-teal-500 to-teal-600 hover:from-teal-400 hover:to-teal-500 text-slate-950 font-bold py-3.5 rounded-xl text-sm flex items-center justify-center gap-2 shadow-lg shadow-teal-500/30">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                <span>تغيير كلمة المرور</span>
            </button>
        </div>

        <p id="forgotMessage" class="mt-4 text-sm text-zinc-400 min-h-[20px]"></p>
    </div>
</div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/login.js"></script>

</body>
</html>
