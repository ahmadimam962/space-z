<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Course View - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family:'Tajawal', sans-serif; background:#060911; }
    .glass { background:rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter:blur(15px); }
  </style>
  <style>
  body {
    user-select: none;
    -webkit-user-select: none;
  }
</style>
</head>

<body class="text-zinc-100 min-h-screen">

<nav class="border-b border-slate-800 bg-slate-900/50">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
    <div class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span> Course</div>
   <a href="my-courses.html" class="text-teal-400 hover:underline" data-en="My Courses" data-ar="كورساتي">كورساتي</a>
    <button id="langToggle" class="border border-teal-500 text-teal-400 px-3 py-1 rounded-lg text-xs hover:bg-teal-500 hover:text-slate-900 transition font-bold">
    EN / AR
</button>
  </div>
</nav>

<main class="max-w-7xl mx-auto px-6 py-10">

  <section class="glass p-6 rounded-3xl mb-8">
    <h1 id="courseTitle" class="text-3xl font-bold mb-3">...</h1>
    <p id="courseDescription" class="text-zinc-400"></p>
  </section>

  <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

    <aside class="glass rounded-3xl p-5 lg:col-span-1">
  <h2 class="text-xl font-bold mb-5" data-en="Course Content" data-ar="محتوى الكورس">محتوى الكورس</h2>
  <div id="sectionsList" class="space-y-5"></div>
</aside>

    <section class="glass rounded-3xl p-6 lg:col-span-2 min-h-[500px]">
      <h2 id="lessonTitle" class="text-2xl font-bold mb-4">
        اختر درس للبدء
      </h2>

      <p id="lessonDescription" class="text-zinc-400 mb-6"></p>

      <div id="lessonContent" class="mt-4">
        <div class="h-64 border border-slate-800 rounded-2xl flex items-center justify-center text-zinc-500">
          اختر درس من القائمة
        </div>
      </div>
    </section>

  </div>

</main>

<footer class="w-full text-center py-6 border-t border-slate-800 bg-slate-900 text-slate-400 text-xs">
    <p>
        © 2026 Space Z. All rights reserved. Created by 
        <a 
            href="https://www.instagram.com/code._.stream" 
            target="_blank" 
            class="text-blue-400 hover:text-blue-300 font-bold transition-colors duration-200 underline underline-offset-4 decoration-blue-400/30"
        >
            @code._.stream
        </a>
    </p>
</footer>
<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://assets.mediadelivery.net/playerjs/player-0.1.0.min.js"></script>

<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/security.js"></script>
<script src="assets/js/course-view.js"></script>

</body>
</html>
