<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Store - Space Z</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Tajawal', sans-serif; background:#060911; }
    .glass { background: rgba(15,23,42,.75); border:1px solid rgba(255,255,255,.1); backdrop-filter: blur(15px); }
  </style>
</head>

<body class="text-zinc-100 min-h-screen flex flex-col">

    <nav class="border-b border-slate-800 bg-slate-900/40 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="dashboard.html" class="text-2xl font-bold text-teal-400">SPACE <span class="text-white">Z</span> <span id="navTitle">Store</span></a>
            <div class="flex gap-8 items-center text-sm font-medium">
                <a href="store.html" id="navStore" class="hover:text-teal-400 transition">السوق</a>
                <a href="my-courses.html" id="navMyCourses" class="hover:text-teal-400 transition">كورساتي</a>
                <a href="dashboard.html" id="navDashboard" class="hover:text-teal-400 transition">لوحة التحكم</a>

                <button id="langToggle" class="border border-teal-500 text-teal-400 px-4 py-1.5 rounded-lg hover:bg-teal-500 hover:text-slate-900 transition font-bold">EN / AR</button>
        </div>
        </div>
    </nav>
 
<main class="max-w-7xl mx-auto px-6 py-10 flex-grow w-full">
  <h1 id="pageTitle" class="text-3xl font-bold mb-8">متجر الكورسات</h1>

  <div id="coursesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

  <p id="emptyMessage" class="hidden text-zinc-400 text-center mt-12">
    لا يوجد كورسات متاحة حالياً
  </p>
</main>

<div id="purchaseModal" class="fixed inset-0 bg-black/70 hidden items-center justify-center z-50 p-4">
  <div class="glass w-full max-w-xl rounded-3xl p-6">
    <div class="flex justify-between items-center mb-5">
      <h2 id="modalTitle" class="text-2xl font-bold">شراء الكورس</h2>
      <button onclick="closePurchaseModal()" class="text-zinc-400 hover:text-red-400">✕</button>
    </div>
    <div id="paymentMethodsContainer"></div>
    <input id="transferNumber" type="text" placeholder="رقم التحويلة" class="w-full mt-4 bg-slate-950 border border-slate-800 rounded-xl px-4 py-3">
    <p id="purchaseMessage" class="text-sm text-red-400 mt-3"></p>
    <button id="submitBtn" onclick="submitPurchase()" class="w-full mt-4 bg-teal-500 hover:bg-teal-600 text-slate-950 font-bold py-3 rounded-xl">إرسال الطلب</button>
  </div>
</div>

<footer class="mt-auto py-10 border-t border-white/5 bg-slate-900/20 backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-6 text-center text-zinc-500 text-sm">
        <p class="mb-2">
            © 2026 Space Z. <span data-en="All rights reserved." data-ar="جميع الحقوق محفوظة.">جميع الحقوق محفوظة.</span>
        </p>
        <p class="flex items-center justify-center gap-2">
            <span data-en="Created by" data-ar="تم التطوير بواسطة">تم التطوير بواسطة</span>
            <a href="https://www.instagram.com/code._.stream" target="_blank" class="text-teal-400 hover:text-white font-bold transition-colors duration-300 underline underline-offset-4 decoration-teal-500/50">@code._.stream</a>
        </p>
      </div>
</footer>
<script src="assets/js/config.js"></script>
<script src="assets/js/utils.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/store.js"></script>
</body>
</html>
